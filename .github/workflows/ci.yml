name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Validate schemas against shipped data
        run: npm run validate:schemas
      - name: Test (unit + integration)
        run: npm test
      - name: Smoke — mock-agent suite run
        run: npm run smoke:mock
      - name: Smoke — leaderboard
        run: npm run smoke:leaderboard
      - name: Smoke — bootstrap CI
        run: npm run bench -- bootstrap --run runs/mock-agent.json
      - name: Smoke — contamination scan
        run: npm run bench -- contamination --run runs/mock-agent.json
      - name: Smoke — provenance hash chain
        run: npm run bench -- provenance --suite suites/lite-public.pt-BR.json --out runs/provenance.json
      - name: Smoke — perturbation pipeline
        run: npm run bench -- perturb-run --suite suites/lite-public.pt-BR.json --limit 3 --out runs/perturb-report.json
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: laibench-runs-node-${{ matrix.node }}
          path: runs/
